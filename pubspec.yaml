name: x_user_agent
description: Flutter plugin for reading WebView and system user-agent data on Android and iOS, plus structured device metadata for client hint use cases.
version: 1.0.0+1
repository: https://github.com/melihcelik09/x_user_agent

environment:
  sdk: ^3.12.0
  flutter: ">=1.10.0"

flutter:
  plugin:
    platforms:
      android:
        package: com.steel.xuseragent
        pluginClass: XUserAgentPlugin
      ios:
        pluginClass: XUserAgentPlugin

dependencies:
  flutter:
    sdk: flutter
  meta: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.5
  pigeon: ^27.1.0
  very_good_analysis: ^10.3.0
